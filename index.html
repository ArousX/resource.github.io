<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArousX_CORE // 传送门</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'JetBrains Mono', 'Noto Sans SC', monospace; 
            background-color: #050505; 
            color: #d1d5db;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
            margin: 0; overflow: hidden; 
        }

        /* PowerShell 风格窗口容器 */
        .window-container {
            width: 100%;
            max-width: 800px;
            background: rgba(12, 12, 12, 0.95);
            border: 1px solid #333;
            border-radius: 6px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 20px rgba(59, 130, 246, 0.05);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* 标题栏 */
        .window-titlebar {
            background: #1e1e1e;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            user-select: none;
        }
        .window-title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            color: #ccc;
            display: flex;
            align-items: center;
        }
        .window-controls {
            display: flex;
            gap: 12px;
            color: #888;
            font-size: 10px;
        }
        .window-controls span:hover { color: #fff; cursor: pointer; }
        .window-controls .close:hover { color: #ff4757; }

        /* 内容区 */
        .window-body {
            padding: 3rem 4rem;
            position: relative;
            min-height: 480px;
            display: flex;
            flex-col;
        }

        /* 滑动上升动画 */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .anim-slide-up {
            opacity: 0; 
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.2s; } 

        /* 按钮悬浮光效 */
        .btn-glitch {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            transition: all 0.2s;
        }
        .btn-glitch:hover {
            background: #3b82f6;
            color: #050505;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* 终端竖线光标 */
        .cursor {
            display: inline-block;
            width: 2.5px; 
            height: 1.2em;
            background-color: #3b82f6;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 3px;
            box-shadow: 0 0 8px #3b82f6; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 乱码发光 */
        .gibberish {
            color: #3b82f6;
            opacity: 0.9;
            text-shadow: 0 0 6px rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-4">
    
    <div class="window-container relative z-10">
        <div class="window-titlebar">
            <div class="window-title">
                <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Administrator: ArousX_CORE.exe
            </div>
            <div class="window-controls">
                <span>─</span>
                <span>◻</span>
                <span class="close">✕</span>
            </div>
        </div>

        <div class="window-body flex flex-col items-center">
            
            <div class="absolute top-6 right-8 text-xs text-blue-500/50 font-bold tracking-widest hidden sm:block">
                SYS.STATUS [ ONLINE ]
            </div>

            <div class="anim-slide-up delay-1 flex flex-col items-center w-full mb-8 mt-4">
                <div class="w-16 h-16 bg-blue-500 flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    <span class="text-4xl font-black text-[#050505]">X</span>
                </div>
                <h1 class="text-5xl md:text-6xl font-black text-white mb-2 uppercase tracking-tight">
                    AROUSX<span class="text-blue-500">_CORE</span>
                </h1>
                <div class="h-1 w-24 bg-blue-500 mb-2 opacity-80"></div>
            </div>
            
            <div class="w-full max-w-md">
                
                <div class="text-gray-400 text-sm md:text-base leading-relaxed text-left h-28">
                    <span id="typed-text"></span><span class="cursor" id="type-cursor"></span>
                </div>
                
                <div class="relative w-full h-20 mt-2">
                    
                    <div id="progress-section" class="absolute inset-0 w-full transition-opacity duration-300 opacity-100">
                        <div class="flex items-center justify-between text-blue-500 text-sm font-bold mb-2">
                            <span id="progress-text">> DECRYPTING MODULES...</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="w-full h-1 bg-gray-800 relative overflow-hidden">
                            <div id="progress-bar" class="absolute top-0 left-0 h-full bg-blue-500 w-0 transition-all duration-75"></div>
                        </div>
                    </div>

                    <div id="btn-container" class="absolute inset-0 w-full flex justify-start opacity-0 pointer-events-none translate-y-4 transition-all duration-500 ease-out">
                        <a href="catalog.html" class="btn-glitch px-8 py-3 font-bold text-lg flex items-center space-x-3 group w-full sm:w-auto">
                            <span>[ EXECUTE ] 进入目录</span>
                            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
                            </svg>
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        const lines = [
            "> INITIALIZING RESOURCE INTERFACE...",
            "> 核心资源库已连接。访问权限已授予。",
            "> 点击下方指令进入目录层。"
        ];
        
        const textContainer = document.getElementById('typed-text');
        const cursor = document.getElementById('type-cursor');
        
        const progSection = document.getElementById('progress-section');
        const progBar = document.getElementById('progress-bar');
        const progPercent = document.getElementById('progress-percent');
        const btnContainer = document.getElementById('btn-container');

        const randomChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/\\';
        
        let lineIndex = 0;
        let charIndex = 0;
        let decodeCycles = 0;
        
        const totalChars = lines.reduce((acc, line) => acc + line.length, 0);
        let charsTyped = 0; 

        const maxDecodeCycles = 2; 
        const baseSpeed = 12;      
        const lineDelay = 100;     

        function decodeEffect() {
            if (lineIndex < lines.length) {
                const currentLine = lines[lineIndex];

                if (charIndex < currentLine.length) {
                    if (decodeCycles < maxDecodeCycles) {
                        let tail = '';
                        let tailLength = Math.min(3, currentLine.length - charIndex);
                        for (let i = 0; i < tailLength; i++) {
                            tail += randomChars[Math.floor(Math.random() * randomChars.length)];
                        }

                        let completedLines = lines.slice(0, lineIndex).join('<br/>');
                        let lockedText = currentLine.substring(0, charIndex);
                        
                        textContainer.innerHTML = (completedLines ? completedLines + '<br/>' : '') + 
                                                  lockedText + 
                                                  `<span class="gibberish">${tail}</span>`;

                        decodeCycles++;
                        setTimeout(decodeEffect, baseSpeed);
                    } else {
                        decodeCycles = 0;
                        charIndex++;
                        charsTyped++; 

                        let percent = Math.floor((charsTyped / totalChars) * 100);
                        progBar.style.width = percent + '%';
                        progPercent.innerText = percent + '%';

                        setTimeout(decodeEffect, baseSpeed);
                    }
                } else {
                    let completedLines = lines.slice(0, lineIndex + 1).join('<br/>');
                    textContainer.innerHTML = completedLines;

                    lineIndex++;
                    charIndex = 0;
                    setTimeout(decodeEffect, lineDelay);
                }
            } else {
                // 打字结束，追加换行和符号，不隐藏光标
                textContainer.innerHTML += "<br/>> ";
                
                progBar.style.width = '100%';
                progPercent.innerText = '100%';
                
                // 定格 400ms 后切换
                setTimeout(() => {
                    progSection.classList.remove('opacity-100');
                    progSection.classList.add('opacity-0');
                    
                    btnContainer.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                    btnContainer.classList.add('opacity-100', 'translate-y-0');
                    btnContainer.style.pointerEvents = 'auto';
                }, 400);
            }
        }

        window.onload = () => {
            setTimeout(decodeEffect, 800);
        };
    </script>
</body>
</html>
