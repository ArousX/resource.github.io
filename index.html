<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArousX_CORE // 传送门</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'JetBrains Mono', 'Noto Sans SC', monospace; 
            background-color: #050505; 
            color: #d1d5db;
            /* 保留原本的网格背景，代码雨会在它上面流动 */
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
            margin: 0; overflow: hidden; 
        }

        /* PowerShell 风格窗口容器 */
        .window-container {
            width: 100%;
            max-width: 800px;
            background: rgba(12, 12, 12, 0.85);
            border: 1px solid #333;
            border-radius: 6px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 30px rgba(59, 130, 246, 0.15);
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        /* 标题栏 */
        .window-titlebar {
            background: #1e1e1e;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            user-select: none;
        }
        .window-title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            color: #ccc;
            display: flex;
            align-items: center;
        }
        .window-controls {
            display: flex;
            gap: 12px;
            color: #888;
            font-size: 10px;
        }
        .window-controls span:hover { color: #fff; cursor: pointer; }
        .window-controls .close:hover { color: #ff4757; }

        /* 内容区 */
        .window-body {
            padding: 3rem 4rem;
            position: relative;
            min-height: 480px;
            display: flex;
            flex-direction: column;
        }

        /* 滑动上升动画 */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .anim-slide-up {
            opacity: 0; 
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.2s; } 

        /* 按钮悬浮光效 */
        .btn-glitch {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            transition: all 0.2s;
        }
        .btn-glitch:hover {
            background: #3b82f6;
            color: #050505;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* 终端竖线光标 */
        .cursor {
            display: inline-block;
            width: 2.5px; 
            height: 1.2em;
            background-color: #3b82f6;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 3px;
            box-shadow: 0 0 8px #3b82f6; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 乱码发光 */
        .gibberish {
            color: #3b82f6;
            opacity: 0.9;
            text-shadow: 0 0 6px rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-4">
    
    <canvas id="matrix-canvas" class="fixed top-0 left-0 w-full h-full z-0 opacity-40 pointer-events-none"></canvas>

    <div class="window-container relative z-10">
        <div class="window-titlebar">
            <div class="window-title">
                <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Administrator: ArousX_CORE.exe
            </div>
            <div class="window-controls">
                <span>─</span>
                <span>◻</span>
                <span class="close">✕</span>
            </div>
        </div>

        <div class="window-body flex flex-col items-center">
            
            <div class="absolute top-6 right-8 text-xs text-blue-500/50 font-bold tracking-widest hidden sm:block">
                SYS.STATUS [ ONLINE ]
            </div>

            <div class="anim-slide-up delay-1 flex flex-col items-center w-full mb-8 mt-4">
                
                <div class="w-32 h-32 mb-6 relative flex items-center justify-center text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]">
                    <svg viewBox="0 0 100 100" width="100%" height="100%" fill="none" style="overflow: visible;">
                        <g id="core-group">
                            <path id="core-path" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"></path>
                        </g>
                    </svg>
                </div>
                <h1 class="text-5xl md:text-6xl font-black text-white mb-2 uppercase tracking-tight">
                    AROUSX<span class="text-blue-500">_CORE</span>
                </h1>
                <div class="h-1 w-24 bg-blue-500 mb-2 opacity-80"></div>
            </div>
            
            <div class="w-full max-w-md">
                
                <div class="text-gray-400 text-sm md:text-base leading-relaxed text-left h-28">
                    <span id="typed-text"></span><span class="cursor" id="type-cursor"></span>
                </div>
                
                <div class="relative w-full h-20 mt-2">
                    
                    <div id="progress-section" class="absolute inset-0 w-full transition-opacity duration-300 opacity-100">
                        <div class="flex items-center justify-between text-blue-500 text-sm font-bold mb-2">
                            <span id="progress-text">> DECRYPTING MODULES...</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="w-full h-1 bg-gray-800 relative overflow-hidden">
                            <div id="progress-bar" class="absolute top-0 left-0 h-full bg-blue-500 w-0 transition-all duration-75"></div>
                        </div>
                    </div>

                    <div id="btn-container" class="absolute inset-0 w-full flex justify-start opacity-0 pointer-events-none translate-y-4 transition-all duration-500 ease-out">
                        <a href="catalog.html" class="btn-glitch px-8 py-3 font-bold text-lg flex items-center space-x-3 group w-full sm:w-auto">
                            <span>[ EXECUTE ] 进入目录</span>
                            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
                            </svg>
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        // ========== 1. 背景代码雨 (Matrix Rain) 引擎 ==========
        function initMatrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+-=[]{}|;:,.<>?/\\';
            const fontSize = 14;
            let columns = Math.floor(canvas.width / fontSize);
            let drops = [];

            for (let x = 0; x < columns; x++) {
                drops[x] = Math.random() * canvas.height; // 随机初始高度，避免一开局像一堵墙
            }

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                columns = Math.floor(canvas.width / fontSize);
                drops = [];
                for (let x = 0; x < columns; x++) {
                    drops[x] = Math.random() * canvas.height;
                }
            });

            function drawMatrix() {
                // 半透明黑色背景，形成尾迹效果
                ctx.fillStyle = 'rgba(5, 5, 5, 0.08)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = fontSize + 'px "JetBrains Mono", monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    
                    // 随机让一些字符特别亮，其他保持暗蓝色
                    ctx.fillStyle = Math.random() > 0.95 ? '#60a5fa' : '#1e3a8a';
                    
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(drawMatrix, 35); // 控制代码雨下落速度
        }

        // ========== 2. 打字机效果与UI逻辑 ==========
        const lines = [
            "> INITIALIZING RESOURCE INTERFACE...",
            "> 核心资源库已连接。访问权限已授予。",
            "> 点击下方指令进入目录层。"
        ];
        
        const textContainer = document.getElementById('typed-text');
        const cursor = document.getElementById('type-cursor');
        const progSection = document.getElementById('progress-section');
        const progBar = document.getElementById('progress-bar');
        const progPercent = document.getElementById('progress-percent');
        const btnContainer = document.getElementById('btn-container');

        const randomChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/\\';
        
        let lineIndex = 0;
        let charIndex = 0;
        let decodeCycles = 0;
        
        const totalChars = lines.reduce((acc, line) => acc + line.length, 0);
        let charsTyped = 0; 

        const maxDecodeCycles = 2; 
        const baseSpeed = 12;      
        const lineDelay = 100;     

        function decodeEffect() {
            if (lineIndex < lines.length) {
                const currentLine = lines[lineIndex];

                if (charIndex < currentLine.length) {
                    if (decodeCycles < maxDecodeCycles) {
                        let tail = '';
                        let tailLength = Math.min(3, currentLine.length - charIndex);
                        for (let i = 0; i < tailLength; i++) {
                            tail += randomChars[Math.floor(Math.random() * randomChars.length)];
                        }

                        let completedLines = lines.slice(0, lineIndex).join('<br/>');
                        let lockedText = currentLine.substring(0, charIndex);
                        
                        textContainer.innerHTML = (completedLines ? completedLines + '<br/>' : '') + 
                                                  lockedText + 
                                                  `<span class="gibberish">${tail}</span>`;

                        decodeCycles++;
                        setTimeout(decodeEffect, baseSpeed);
                    } else {
                        decodeCycles = 0;
                        charIndex++;
                        charsTyped++; 

                        let percent = Math.floor((charsTyped / totalChars) * 100);
                        progBar.style.width = percent + '%';
                        progPercent.innerText = percent + '%';

                        setTimeout(decodeEffect, baseSpeed);
                    }
                } else {
                    let completedLines = lines.slice(0, lineIndex + 1).join('<br/>');
                    textContainer.innerHTML = completedLines;

                    lineIndex++;
                    charIndex = 0;
                    setTimeout(decodeEffect, lineDelay);
                }
            } else {
                textContainer.innerHTML += "<br/>> ";
                progBar.style.width = '100%';
                progPercent.innerText = '100%';
                
                setTimeout(() => {
                    progSection.classList.remove('opacity-100');
                    progSection.classList.add('opacity-0');
                    
                    btnContainer.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                    btnContainer.classList.add('opacity-100', 'translate-y-0');
                    btnContainer.style.pointerEvents = 'auto';
                }, 400);
            }
        }

        // ========== 3. Rose Four 核心动画引擎 ==========
        function initRoseFourAnimation() {
            const SVG_NS = 'http://www.w3.org/2000/svg';
            const config = {
                rotate: true,
                particleCount: 78,
                trailSpan: 0.32,
                durationMs: 5400,
                rotationDurationMs: 28000,
                pulseDurationMs: 4500,
                strokeWidth: 4.6,
                roseA: 9.2,
                roseABoost: 0.6,
                roseBreathBase: 0.72,
                roseBreathBoost: 0.28,
                roseScale: 3.25,
                point(progress, detailScale, config) {
                    const t = progress * Math.PI * 2;
                    const a = config.roseA + detailScale * config.roseABoost;
                    const r = a * (config.roseBreathBase + detailScale * config.roseBreathBoost) * Math.cos(4 * t);
                    return {
                        x: 50 + Math.cos(t) * r * config.roseScale,
                        y: 50 + Math.sin(t) * r * config.roseScale,
                    };
                }
            };

            const group = document.querySelector('#core-group');
            const path = document.querySelector('#core-path');
            path.setAttribute('stroke-width', String(config.strokeWidth));

            const particles = Array.from({ length: config.particleCount }, () => {
                const circle = document.createElementNS(SVG_NS, 'circle');
                circle.setAttribute('fill', 'currentColor');
                group.appendChild(circle);
                return circle;
            });

            function normalizeProgress(progress) {
                return ((progress % 1) + 1) % 1;
            }
            
            function getDetailScale(time) {
                const pulseProgress = (time % config.pulseDurationMs) / config.pulseDurationMs;
                const pulseAngle = pulseProgress * Math.PI * 2;
                return 0.52 + ((Math.sin(pulseAngle + 0.55) + 1) / 2) * 0.48;
            }
            
            function getRotation(time) {
                if (!config.rotate) return 0;
                return -((time % config.rotationDurationMs) / config.rotationDurationMs) * 360;
            }
            
            function buildPath(detailScale, steps = 480) {
                return Array.from({ length: steps + 1 }, (_, index) => {
                    const point = config.point(index / steps, detailScale, config);
                    return `${index === 0 ? 'M' : 'L'} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`;
                }).join(' ');
            }
            
            function getParticle(index, progress, detailScale) {
                const tailOffset = index / (config.particleCount - 1);
                const point = config.point(normalizeProgress(progress - tailOffset * config.trailSpan), detailScale, config);
                const fade = Math.pow(1 - tailOffset, 0.56);
                return {
                    x: point.x,
                    y: point.y,
                    radius: 0.9 + fade * 2.7,
                    opacity: 0.04 + fade * 0.96,
                };
            }

            const startedAt = performance.now();
            function render(now) {
                const time = now - startedAt;
                const progress = (time % config.durationMs) / config.durationMs;
                const detailScale = getDetailScale(time);
                
                group.setAttribute('transform', `rotate(${getRotation(time)} 50 50)`);
                path.setAttribute('d', buildPath(detailScale));
                
                particles.forEach((node, index) => {
                    const particle = getParticle(index, progress, detailScale);
                    node.setAttribute('cx', particle.x.toFixed(2));
                    node.setAttribute('cy', particle.y.toFixed(2));
                    node.setAttribute('r', particle.radius.toFixed(2));
                    node.setAttribute('opacity', Math.min(1, particle.opacity + 0.15).toFixed(3));
                });
                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);
        }

        // ========== 4. 初始化所有动画 ==========
        window.onload = () => {
            initMatrixRain();         // 启动背景代码雨
            initRoseFourAnimation();  // 启动核心玫瑰动画
            setTimeout(decodeEffect, 800); // 启动打字机加载效果
        };
    </script>
</body>
</html>
