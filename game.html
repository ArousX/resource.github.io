<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>像素穿梭 - 手机完美版</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; touch-action: manipulation; }
        canvas { background: #222; display: block; }
        .score { position: absolute; top: 40px; width: 100%; text-align: center; color: #fff; font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 10; }
    </style>
</head>
<body>
    <div class="score" id="scoreDiv">0</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDiv = document.getElementById('scoreDiv');

// 适配屏幕
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// 游戏参数
let gameState = 'START';
let birdSize = Math.min(canvas.width, canvas.height) * 0.07; 
let bird = { 
    x: canvas.width * 0.05, // 修改：位置往左挪，给右手操作留出视野
    y: canvas.height / 2, 
    w: birdSize, 
    h: birdSize, 
    velocity: 0, 
    gravity: 0.05, 
    jump: -2.5 
};
let pipes = [];
let frame = 0;
let score = 0;
let moveSpeed = 2.5; // 速度适中
let lastPipeHeight = canvas.height / 2;

function handleInteraction(e) {
    if (e) e.preventDefault();
    if (gameState === 'START') {
        gameState = 'PLAYING';
    } else if (gameState === 'PLAYING') {
        bird.velocity = bird.jump;
    } else if (gameState === 'GAMEOVER') {
        resetGame();
    }
}

document.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInteraction(); });
canvas.addEventListener('touchstart', handleInteraction, { passive: false });
canvas.addEventListener('mousedown', handleInteraction);

function resetGame() {
    bird.y = canvas.height / 2; bird.velocity = 0;
    pipes = []; score = 0; frame = 0; lastPipeHeight = canvas.height / 2;
    scoreDiv.innerHTML = `0`;
    gameState = 'PLAYING';
}

function createPipe() {
    const gap = canvas.height * 0.28; 
    const minHeight = 60;
    const maxDiff = canvas.height * 0.22; 

    let targetHeight = lastPipeHeight + (Math.random() * maxDiff * 2 - maxDiff);
    if (targetHeight < minHeight) targetHeight = minHeight;
    if (targetHeight > canvas.height - gap - minHeight) targetHeight = canvas.height - gap - minHeight;

    lastPipeHeight = targetHeight;
    pipes.push({ x: canvas.width, top: targetHeight, bottom: canvas.height - targetHeight - gap, w: 70, scored: false });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'START') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f1c40f';
        ctx.textAlign = 'center';
        ctx.font = 'bold 28px Arial';
        ctx.fillText('像素穿梭', canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '18px Arial';
        ctx.fillText('点击屏幕开始', canvas.width/2, canvas.height/2 + 30);
    } 
    
    else if (gameState === 'PLAYING' || gameState === 'GAMEOVER') {
        if (gameState === 'PLAYING') {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            if (frame % Math.floor(canvas.width / 4) === 0) createPipe();
            frame++;
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            if (gameState === 'PLAYING') pipes[i].x -= moveSpeed;

            // 碰撞检测
            if (bird.x + bird.w * 0.7 > pipes[i].x && bird.x < pipes[i].x + pipes[i].w) {
                if (bird.y + bird.h * 0.15 < pipes[i].top || bird.y + bird.h * 0.85 > canvas.height - pipes[i].bottom) {
                    gameState = 'GAMEOVER';
                }
            }

            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(pipes[i].x, 0, pipes[i].w, pipes[i].top);
            ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, pipes[i].w, pipes[i].bottom);

            if (gameState === 'PLAYING' && pipes[i].x + pipes[i].w < bird.x && !pipes[i].scored) {
                score++;
                pipes[i].scored = true;
                scoreDiv.innerHTML = score;
            }
            if (pipes[i].x + pipes[i].w < 0) pipes.splice(i, 1);
        }

        // 画主角
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

        if (bird.y + bird.h > canvas.height || bird.y < 0) gameState = 'GAMEOVER';

        if (gameState === 'GAMEOVER') {
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.font = '24px Arial';
            ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 10);
            ctx.fillText('得分: ' + score, canvas.width/2, canvas.height/2 + 30);
            ctx.font = '16px Arial';
            ctx.fillText('再次点击重试', canvas.width/2, canvas.height/2 + 70);
        }
    }
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
</html>
