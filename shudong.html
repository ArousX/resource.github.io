<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名终端 - ArousX_CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #3b82f6; /* 科技蓝 */
        }

        body { 
            font-family: 'JetBrains Mono', 'Noto Sans SC', monospace; 
            background-color: #050505; 
            color: #d1d5db;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 全屏顶部状态栏 */
        .system-topbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .system-title {
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        /* macOS 风格红黄绿圆点 */
        .mac-dots {
            display: flex;
            gap: 8px;
            margin-right: 16px;
        }
        .mac-dot { width: 12px; height: 12px; border-radius: 50%; }
        .mac-close { background-color: #ff5f56; border: 1px solid #e0443e; }
        .mac-min { background-color: #ffbd2e; border: 1px solid #dea123; }
        .mac-max { background-color: #27c93f; border: 1px solid #1aab29; }

        /* 全屏内容区容器 */
        .page-wrapper {
            flex-grow: 1;
            padding: 3rem 2rem;
            max-width: 900px; /* 树洞居中紧凑布局 */
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 终端数据块卡片 */
        .tech-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid #1e293b;
            border-left: 4px solid #334155;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .tech-card:hover {
            border-left-color: var(--accent);
            background: rgba(15, 23, 42, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), inset 2px 0 10px rgba(59, 130, 246, 0.05);
        }

        .tech-card::before {
            content: ''; 
            position: absolute; 
            top: -1px; 
            right: -1px;
            border-width: 0 12px 12px 0; 
            border-style: solid; 
            border-color: #050505 transparent transparent #050505;
            transition: border-color 0.2s;
        }
        .tech-card:hover::before { 
            border-color: var(--accent) transparent transparent var(--accent); 
        }

        /* 终端输入框 */
        .input-terminal {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid #1e293b;
            color: #d1d5db;
            outline: none;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
        }
        
        .input-terminal:focus {
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.15), inset 0 0 5px rgba(59, 130, 246, 0.1);
        }

        /* 动作按钮 */
        .btn-action { 
            background: transparent; 
            color: var(--accent); 
            border: 1px solid #1e293b; 
            transition: all 0.2s; 
            cursor: pointer;
        }
        .btn-action:hover:not(:disabled) { 
            background: var(--accent); 
            color: #050505; 
            border-color: var(--accent); 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        .btn-action:disabled {
            color: #475569;
            border-color: #1e293b;
            cursor: not-allowed;
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <header class="system-topbar">
        <div class="system-title font-sans">
            <div class="mac-dots">
                <div class="mac-dot mac-close"></div>
                <div class="mac-dot mac-min"></div>
                <div class="mac-dot mac-max"></div>
            </div>
            <span class="font-bold text-slate-300">root@arousx_core:</span> <span class="ml-2 text-slate-500">~/shudong</span>
        </div>
        <div class="flex items-center space-x-6 text-xs text-slate-500 font-bold font-mono">
            <span class="text-blue-500">SYS_STATUS: [ ONLINE ]</span>
        </div>
    </header>

    <div class="page-wrapper">
        
        <!-- 页面导航头部 -->
        <nav class="border-b border-slate-800 pb-5 mb-8 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4">
            <div>
                <div class="text-xs text-blue-500 font-bold tracking-widest mb-2">> DIR / ROOT / MODULE_SHUDONG</div>
                <div class="text-3xl md:text-4xl font-black text-white uppercase tracking-tighter flex items-center">
                    <span class="w-2.5 h-8 bg-blue-500 mr-4 inline-block shadow-[0_0_12px_#3b82f6]"></span>
                    匿名终端
                </div>
                <div class="text-sm text-slate-500 mt-2 font-mono">CONNECTION: Mohub.online SECURE LINK</div>
            </div>
            <a href="catalog.html" class="text-sm text-slate-500 hover:text-blue-400 transition-colors flex items-center space-x-2 font-bold group pb-1">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span>[ ESC ] 返回档案目录</span>
            </a>
        </nav>

        <!-- 发布区 -->
        <div class="border border-slate-800 bg-slate-900/30 p-6 relative mb-10 shadow-lg">
            <!-- 边角装饰 -->
            <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-blue-500/50"></div>
            <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-blue-500/50"></div>

            <div class="flex items-center text-xs font-bold font-mono text-blue-400 mb-4 tracking-widest">
                > INITIALIZE_TRANSMISSION
            </div>

            <input id="authorInput" class="input-terminal w-full p-3 mb-4 text-sm" placeholder="> USER_ALIAS [留空则为匿名]">
            <textarea id="contentInput" class="input-terminal w-full p-3 mb-4 text-sm h-32 resize-none" placeholder="> INPUT_DATA (写下你的心事...)"></textarea>
            
            <button id="submitBtn" class="btn-action w-full py-3 font-bold text-sm flex items-center justify-center uppercase tracking-widest group">
                <span>> EXECUTE_TRANSMIT [发送]</span>
            </button>
        </div>

        <!-- 留言板区 -->
        <div class="flex items-center text-xs font-bold font-mono text-slate-500 mb-4 tracking-widest border-b border-slate-800 pb-2">
            > SYSTEM_LOG / RECORD_MESSAGES
        </div>
        
        <div id="messageBoard" class="flex flex-col gap-5">
            <div class="text-center text-blue-500 font-mono text-sm py-10 animate-pulse">> FETCHING_DATA...</div>
        </div>

        <footer class="mt-16 pt-6 border-t border-slate-800/80 text-slate-600 text-xs flex justify-between items-center font-mono">
            <span class="opacity-80">Mohub Module // END OF LINE</span>
            <span class="flex items-center"><span class="w-2 h-2 rounded-full bg-blue-500 mr-2"></span> SUPABASE: ACTIVE</span>
        </footer>

    </div>

    <!-- 逻辑层：完全保留原代码 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    const client = window.supabase.createClient(
        'https://ovfwarzvmdynmysdagmy.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92Zndhcnp2bWR5bm15c2RhZ215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTQ5NzQsImV4cCI6MjA5MTczMDk3NH0.ZzAec-6TcRIOxfviuWSx8rdwR8S_8YeoeD_L7IWt0Gs'
    );

    const TABLE = 'hold';

    const board = document.getElementById('messageBoard');
    const btn = document.getElementById('submitBtn');
    const authorInput = document.getElementById('authorInput');
    const contentInput = document.getElementById('contentInput');

    async function load() {
        const { data, error } = await client
            .from(TABLE)
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            board.innerHTML = `<div class="text-red-500 font-mono text-sm text-center py-10">> ERROR: ${error.message}</div>`;
            return;
        }

        board.innerHTML = '';

        if (!data.length) {
            board.innerHTML = '<div class="text-slate-500 font-mono text-sm text-center py-10">> DATABASE_EMPTY</div>';
            return;
        }

        data.forEach(i => board.appendChild(card(i)));
    }

    async function send() {
        const author = authorInput.value.trim() || '匿名';
        const content = contentInput.value.trim();

        if (!content) return alert('内容不能为空');

        btn.disabled = true;
        btn.innerHTML = '> PROCESSING...';

        const { data, error } = await client
            .from(TABLE)
            .insert([{ author, content }])
            .select();

        btn.disabled = false;
        btn.innerHTML = '<span>> EXECUTE_TRANSMIT [发送]</span>';

        if (error) return alert(error.message);

        contentInput.value = '';
        board.prepend(card(data[0]));
    }

    // 更新后的卡片 HTML 渲染结构，使用终端样式
    function card(i) {
        const div = document.createElement('div');
        div.className = 'tech-card p-5 flex flex-col';

        div.innerHTML = `
            <div class="flex justify-between items-start mb-4 border-b border-slate-800/60 pb-3">
                <span class="text-xs font-bold px-2 py-1 bg-slate-800/40 text-blue-400 font-mono border border-slate-700">
                    USR: ${i.author}
                </span>
                <span class="text-slate-500 text-xs font-mono tracking-tighter">${new Date(i.created_at).toLocaleString()}</span>
            </div>
            <div class="text-sm text-slate-300 font-sans leading-relaxed whitespace-pre-wrap break-all">
                ${i.content}
            </div>
        `;
        return div;
    }

    btn.onclick = send;
    load();
    </script>
</body>
</html>
